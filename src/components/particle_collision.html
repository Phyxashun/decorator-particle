<canvas id="c" style="display:block;width:100%;background:#21222c;border-radius:12px"></canvas>
<div style="display:flex;gap:10px;justify-content:center;margin-top:12px">
  <button onclick="reset()" style="background:#44475a;color:#f8f8f2;border:none;padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:monospace">replay</button>
  <button onclick="slowmo=!slowmo;this.textContent=slowmo?'normal speed':'slow motion'" style="background:#44475a;color:#f8f8f2;border:none;padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:monospace">slow motion</button>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
cv.width=680;cv.height=380;
let slowmo=false,raf,t=0,phase='approach',debris=[],shockR=0,shockA=1,impactX,impactY;

const A={x:80,y:190,vx:3.2,color:'#bd93f9',trail:[]};
const B={x:600,y:190,vx:-3.2,color:'#ff5555',trail:[]};

function reset(){
  cancelAnimationFrame(raf);
  t=0;phase='approach';debris=[];shockR=0;shockA=1;
  A.x=80;A.y=190;A.vx=3.2;A.trail=[];
  B.x=600;B.y=190;B.vx=-3.2;B.trail=[];
  loop();
}

function spawnDebris(x,y){
  const colors=['#bd93f9','#ff5555','#ff79c6','#8be9fd','#50fa7b','#f1fa8c','#ffb86c'];
  for(let i=0;i<52;i++){
    const a=Math.random()*Math.PI*2;
    const spd=1+Math.random()*7;
    const sz=1.5+Math.random()*5;
    debris.push({
      x,y,
      vx:Math.cos(a)*spd,
      vy:Math.sin(a)*spd,
      r:sz,
      color:colors[Math.floor(Math.random()*colors.length)],
      life:1,
      decay:0.008+Math.random()*0.012,
      square:Math.random()>0.6
    });
  }
}

function drawParticle(p,r,alpha=1){
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.beginPath();
  ctx.arc(p.x,p.y,r,0,Math.PI*2);
  ctx.fillStyle=p.color;
  ctx.fill();
  ctx.strokeStyle='#f8f8f2';
  ctx.lineWidth=2;
  ctx.globalAlpha=alpha*0.4;
  ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.globalAlpha=alpha*0.18;
  ctx.beginPath();
  ctx.arc(p.x,p.y,r+8,0,Math.PI*2);
  ctx.fillStyle=p.color;
  ctx.fill();
  ctx.restore();
}

function drawTrail(trail,color){
  for(let i=1;i<trail.length;i++){
    const a=(i/trail.length)*0.5;
    ctx.beginPath();
    ctx.moveTo(trail[i-1].x,trail[i-1].y);
    ctx.lineTo(trail[i].x,trail[i].y);
    ctx.strokeStyle=color;
    ctx.lineWidth=Math.max(1,i/trail.length*14);
    ctx.globalAlpha=a;
    ctx.stroke();
  }
}

function drawVelocityLine(p,flip){
  ctx.save();
  ctx.globalAlpha=0.3;
  ctx.strokeStyle=p.color;
  ctx.lineWidth=1.5;
  ctx.setLineDash([6,4]);
  ctx.beginPath();
  ctx.moveTo(p.x+(flip?30:-30),p.y);
  ctx.lineTo(p.x+(flip?90:-90),p.y);
  ctx.stroke();
  ctx.restore();
}

function loop(){
  const speed=slowmo?0.3:1;
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#21222c';
  ctx.fillRect(0,0,cv.width,cv.height);

  if(phase==='approach'){
    A.x+=A.vx*speed;B.x+=B.vx*speed;
    A.trail.push({x:A.x,y:A.y});B.trail.push({x:B.x,y:B.y});
    if(A.trail.length>30)A.trail.shift();
    if(B.trail.length>30)B.trail.shift();

    ctx.save();ctx.globalAlpha=1;
    drawTrail(A.trail,A.color);drawTrail(B.trail,B.color);
    ctx.restore();

    drawVelocityLine(A,true);drawVelocityLine(B,false);
    drawParticle(A,22);drawParticle(B,22);

    const gap=Math.abs(A.x-B.x);
    if(gap<6){
      impactX=(A.x+B.x)/2;impactY=A.y;
      spawnDebris(impactX,impactY);
      shockR=0;shockA=1;phase='explode';
    }
    t++;

  } else if(phase==='explode'){
    shockR+=6*speed;shockA=Math.max(0,shockA-0.025*speed);
    let alive=false;
    for(const d of debris){
      d.x+=d.vx*speed;d.y+=d.vy*speed;
      d.vy+=0.06*speed;
      d.life-=d.decay*speed;
      if(d.life>0)alive=true;
      ctx.save();
      ctx.globalAlpha=Math.max(0,d.life);
      if(d.square){
        ctx.fillStyle=d.color;
        ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.life*5);
        ctx.fillRect(-d.r,-d.r,d.r*2,d.r*2);
        ctx.restore();
      } else {
        ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fillStyle=d.color;ctx.fill();
      }
      ctx.restore();
    }
    if(shockR>0&&shockA>0){
      for(let i=0;i<3;i++){
        ctx.save();
        ctx.globalAlpha=shockA*(1-i*0.3)*0.5;
        ctx.beginPath();
        ctx.arc(impactX,impactY,shockR+i*22,0,Math.PI*2);
        ctx.strokeStyle='#f8f8f2';
        ctx.lineWidth=3-i;
        ctx.stroke();
        ctx.restore();
      }
      ctx.save();
      ctx.globalAlpha=shockA*0.12;
      ctx.beginPath();
      ctx.arc(impactX,impactY,shockR*0.6,0,Math.PI*2);
      ctx.fillStyle='#f8f8f2';
      ctx.fill();
      ctx.restore();
    }
    if(!alive&&shockA<=0){
      setTimeout(reset,900);
      phase='done';
    }
  }
  if(phase!=='done')raf=requestAnimationFrame(loop);
}
reset();
</script>
