<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dracula Particle Explosions</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #282a36;
        font-family: 'Fira Code', monospace;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 48px 24px;
        gap: 40px;
      }
      header {
        text-align: center;
      }
      header h1 {
        color: #f8f8f2;
        font-size: 15px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        font-weight: 600;
      }
      header p {
        color: #6272a4;
        font-size: 12px;
        letter-spacing: 0.15em;
        margin-top: 6px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 32px;
        max-width: 840px;
        width: 100%;
      }
      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        cursor: pointer;
      }
      .card svg {
        transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .card:hover svg {
        transform: scale(1.1);
      }
      .label {
        color: #6272a4;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>particle.system — icons</h1>
      <p>// dracula theme — 8 variants</p>
    </header>
