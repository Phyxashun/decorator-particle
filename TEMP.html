<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Particle System — QuadTree + @Decorator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.9.4/css/bulma.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #03050d;
        --surface: #070b18;
        --border: #111828;
        --text: #9aadcc;
        --dim: #2e3f5a;
        --bright: #cdd8ee;
        --accent: #38c8a8;
        --accent2: #ff7b9c;
        --blue: #5b9cf6;
        --yellow: #f0c85a;
      }
      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: 'DM Mono', monospace;
        overflow: hidden;
      }

      .navbar {
        background: var(--surface) !important;
        border-bottom: 1px solid var(--border);
        min-height: 44px;
        font-family: 'DM Mono', monospace;
      }
      .navbar-item,
      .navbar-link {
        color: var(--text) !important;
        font-size: 11px;
        letter-spacing: 0.05em;
      }
      .navbar-item strong {
        color: var(--accent);
      }
      .navbar-menu {
        background: var(--surface) !important;
      }
      .stat-tag {
        font-size: 10px;
        letter-spacing: 0.05em;
        color: var(--dim);
        font-family: 'DM Mono', monospace;
      }
      .stat-tag b {
        color: var(--accent);
      }
      .stat-tag:nth-child(2) b {
        color: var(--accent2);
      }
      .stat-tag:nth-child(3) b {
        color: var(--yellow);
      }
      .stat-tag:nth-child(4) b {
        color: var(--blue);
      }
      .tag.is-qt {
        background: rgba(56, 200, 168, 0.1);
        color: var(--accent);
        border: 1px solid rgba(56, 200, 168, 0.3);
        font-family: 'DM Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.08em;
      }
      .tag.is-dec {
        background: rgba(91, 156, 246, 0.1);
        color: var(--blue);
        border: 1px solid rgba(91, 156, 246, 0.3);
        font-family: 'DM Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.08em;
      }

      .app-body {
        display: flex;
        height: calc(100vh - 44px);
        margin-top: 44px;
        overflow: hidden;
      }

      .left-panel {
        width: 195px;
        min-width: 195px;
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 10px 8px;
        gap: 2px;
      }
      .menu-label {
        color: var(--dim) !important;
        font-size: 8px !important;
        letter-spacing: 0.15em !important;
        font-family: 'DM Mono', monospace;
        margin: 8px 0 3px 4px !important;
      }

      .mode-btn {
        width: 100%;
        text-align: left;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--dim);
        font-family: 'DM Mono', monospace;
        font-size: 10.5px;
        padding: 7px 9px;
        border-radius: 4px;
        cursor: pointer;
        transition: 0.12s;
        margin-bottom: 2px;
        display: block;
        line-height: 1.3;
      }
      .mode-btn:hover {
        border-color: #1a2540;
        color: var(--text);
        background: transparent;
      }
      .mode-btn.is-active {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(56, 200, 168, 0.06);
      }
      .mode-btn .mode-sub {
        display: block;
        font-size: 8px;
        opacity: 0.5;
        margin-top: 2px;
        letter-spacing: 0.04em;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 9px;
        border: 1px solid var(--border);
        border-radius: 4px;
        cursor: pointer;
        user-select: none;
        margin-bottom: 2px;
        transition: 0.12s;
      }
      .toggle-row:hover {
        border-color: #1a2540;
      }
      .toggle-label {
        font-size: 10px;
        color: var(--text);
        font-family: 'DM Mono', monospace;
      }
      .toggle-pip {
        width: 26px;
        height: 14px;
        background: var(--border);
        border-radius: 8px;
        position: relative;
        transition: 0.2s;
        flex-shrink: 0;
      }
      .toggle-pip::after {
        content: '';
        position: absolute;
        width: 10px;
        height: 10px;
        background: var(--dim);
        border-radius: 50%;
        top: 2px;
        left: 2px;
        transition: 0.2s;
      }
      .toggle-row.is-on .toggle-pip {
        background: rgba(56, 200, 168, 0.3);
      }
      .toggle-row.is-on .toggle-pip::after {
        background: var(--accent);
        left: 14px;
      }

      .slider-block {
        padding: 5px 9px 3px;
        margin-bottom: 2px;
      }
      .slider-block .slider-label {
        display: flex;
        justify-content: space-between;
        font-size: 9px;
        color: var(--dim);
        letter-spacing: 0.06em;
        margin-bottom: 3px;
        font-family: 'DM Mono', monospace;
      }
      .slider-block .slider-label span {
        color: var(--text);
      }
      .slider-block input[type='range'] {
        width: 100%;
        accent-color: var(--accent);
        cursor: pointer;
        height: 3px;
      }

      .canvas-wrap {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: var(--bg);
      }
      #c {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }
      .canvas-hint {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9.5px;
        color: var(--dim);
        letter-spacing: 0.08em;
        pointer-events: none;
        white-space: nowrap;
        font-family: 'DM Mono', monospace;
      }

      .right-panel {
        width: 205px;
        min-width: 205px;
        background: var(--surface);
        border-left: 1px solid var(--border);
        padding: 12px 11px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }
      .panel-section-label {
        font-size: 8px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 7px;
        font-family: 'DM Mono', monospace;
      }
      .qt-box {
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg);
        margin-bottom: 12px;
        aspect-ratio: 1;
        overflow: hidden;
      }
      #qt-canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      .dec-stack {
        display: flex;
        flex-direction: column;
        font-size: 10px;
        line-height: 1.75;
        font-family: 'DM Mono', monospace;
        flex: 1;
      }
      .dec-at {
        color: var(--dim);
      }
      .dec-name {
        color: var(--yellow);
      }
      .dec-paren {
        color: var(--dim);
      }
      .dec-args {
        color: var(--accent);
      }
      .dec-class {
        color: var(--bright);
        margin-top: 2px;
      }
      .dec-kw {
        color: var(--accent2);
      }
      .dec-ext {
        color: var(--dim);
      }
      .panel-divider {
        background: var(--border);
        height: 1px;
        border: none;
        margin: 8px 0;
      }
      .perf-box {
        padding: 7px 9px;
        background: rgba(56, 200, 168, 0.04);
        border: 1px solid rgba(56, 200, 168, 0.12);
        border-radius: 4px;
        font-size: 9px;
        color: var(--dim);
        line-height: 1.6;
        letter-spacing: 0.03em;
        font-family: 'DM Mono', monospace;
      }
      .perf-box b {
        color: var(--accent);
      }
      .primary-badge {
        font-size: 8.5px;
        color: var(--yellow);
        letter-spacing: 0.04em;
        margin-bottom: 6px;
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <nav class="navbar is-fixed-top">
      <div class="navbar-brand">
        <div class="navbar-item">
          <span>Particle System&nbsp;<strong>/ QuadTree</strong></span>
          <div class="tags ml-2" style="margin: 0">
            <span class="tag is-qt">QuadTree</span>
            <span class="tag is-dec ml-1">@Decorator</span>
          </div>
        </div>
      </div>
      <div class="navbar-menu">
        <div class="navbar-end">
          <div class="navbar-item">
            <div style="display: flex; gap: 16px">
              <span class="stat-tag">particles <b id="st-count">0</b></span>
              <span class="stat-tag">fps <b id="st-fps">0</b></span>
              <span class="stat-tag">qt nodes <b id="st-qt">0</b></span>
              <span class="stat-tag">avg neighbors <b id="st-nb">0</b></span>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="app-body">
      <!-- LEFT PANEL -->
      <aside class="left-panel">
        <p class="menu-label">Visual / Lifecycle</p>

        <button class="mode-btn is-active" data-mode="spark">
          SparkParticle
          <span class="mode-sub">@WithGravity · @WithTrail · @WithShrink</span>
        </button>
        <button class="mode-btn" data-mode="bubble">
          BubbleParticle
          <span class="mode-sub">@WithGlow · @WithFade · @WithLifetime</span>
        </button>
        <button class="mode-btn" data-mode="confetti">
          ConfettiParticle
          <span class="mode-sub">@WithRotation · @WithGravity</span>
        </button>
        <button class="mode-btn" data-mode="snow">
          SnowParticle
          <span class="mode-sub">@WithDrag · @WithGravity</span>
        </button>
        <button class="mode-btn" data-mode="bouncer">
          BouncerParticle
          <span class="mode-sub">@WithBounce · @WithRotation</span>
        </button>

        <p class="menu-label" style="margin-top: 8px">Spatial / QuadTree</p>

        <button class="mode-btn" data-mode="flock">
          FlockParticle
          <span class="mode-sub">@WithFlocking · @WithWrap</span>
        </button>
        <button class="mode-btn" data-mode="constellation">
          ConstellationParticle
          <span class="mode-sub">@WithAttraction · @WithLinkDraw</span>
        </button>
        <button class="mode-btn" data-mode="repulsor">
          RepulsorParticle
          <span class="mode-sub">@WithRepulsion · @WithDrag</span>
        </button>
        <button class="mode-btn" data-mode="orbital">
          OrbitalParticle
          <span class="mode-sub">@WithRepulsion + @WithAttraction</span>
        </button>

        <p class="menu-label" style="margin-top: 8px">Display</p>
        <div class="toggle-row" id="tog-qt">
          <span class="toggle-label">Show QuadTree</span>
          <div class="toggle-pip"></div>
        </div>
        <div class="toggle-row" id="tog-radius">
          <span class="toggle-label">Show Radius</span>
          <div class="toggle-pip"></div>
        </div>
        <div class="toggle-row is-on" id="tog-links">
          <span class="toggle-label">Trail / Links</span>
          <div class="toggle-pip"></div>
        </div>

        <p class="menu-label" style="margin-top: 8px">Spawn</p>
        <div class="slider-block">
          <div class="slider-label">Count per click <span id="lbl-count">10</span></div>
          <input type="range" id="sl-count" min="1" max="40" value="10" />
        </div>
        <div class="slider-block">
          <div class="slider-label">Speed <span id="lbl-speed">1.0×</span></div>
          <input type="range" id="sl-speed" min="0.1" max="3" step="0.1" value="1" />
        </div>

        <p class="menu-label" style="margin-top: 8px">Canvas</p>
        <button class="mode-btn" id="clearBtn">Clear</button>
        <button class="mode-btn" id="fillBtn">Fill (200)</button>
      </aside>

      <!-- CANVAS -->
      <div class="canvas-wrap">
        <canvas id="c"></canvas>
        <div class="canvas-hint">click or drag · <span id="mode-hint">SparkParticle</span></div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <p class="panel-section-label">QuadTree Live View</p>
        <div class="qt-box"><canvas id="qt-canvas"></canvas></div>
        <p class="panel-section-label">Decorator Stack</p>
        <div id="primary-badge" class="primary-badge"></div>
        <div id="dec-stack" class="dec-stack"></div>
        <hr class="panel-divider" />
        <div id="perf-note" class="perf-box"></div>
      </div>
    </div>

    <script>
      // ════════════════════════════════════════════════════════════════
      //  Vector
      // ════════════════════════════════════════════════════════════════
      class Vec {
        constructor(x = 0, y = 0) {
          this.x = x;
          this.y = y;
        }
        add(v) {
          return new Vec(this.x + v.x, this.y + v.y);
        }
        sub(v) {
          return new Vec(this.x - v.x, this.y - v.y);
        }
        scale(s) {
          return new Vec(this.x * s, this.y * s);
        }
        clone() {
          return new Vec(this.x, this.y);
        }
        mag() {
          return Math.sqrt(this.x * this.x + this.y * this.y);
        }
        normalize() {
          const m = this.mag();
          return m > 0 ? this.scale(1 / m) : new Vec();
        }
        limit(max) {
          return this.mag() > max ? this.normalize().scale(max) : this.clone();
        }
        static zero() {
          return new Vec(0, 0);
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  QuadTree
      // ════════════════════════════════════════════════════════════════
      class Rect {
        constructor(cx, cy, hw, hh) {
          this.cx = cx;
          this.cy = cy;
          this.hw = hw;
          this.hh = hh;
        }
        contains(px, py) {
          return px >= this.cx - this.hw && px < this.cx + this.hw && py >= this.cy - this.hh && py < this.cy + this.hh;
        }
        intersects(o) {
          return !(
            o.cx - o.hw >= this.cx + this.hw ||
            o.cx + o.hw <= this.cx - this.hw ||
            o.cy - o.hh >= this.cy + this.hh ||
            o.cy + o.hh <= this.cy - this.hh
          );
        }
        static circle(cx, cy, r) {
          return new Rect(cx, cy, r, r);
        }
      }
      class QuadTree {
        constructor(boundary, cap = 8, maxD = 8, depth = 0) {
          this.boundary = boundary;
          this.cap = cap;
          this.maxD = maxD;
          this.depth = depth;
          this.pts = [];
          this.divided = false;
          this.ne = this.nw = this.se = this.sw = null;
        }
        clear() {
          this.pts.length = 0;
          this.divided = false;
          this.ne = this.nw = this.se = this.sw = null;
        }
        insert(x, y, p) {
          if (!this.boundary.contains(x, y)) return false;
          if (!this.divided && this.pts.length < this.cap) {
            this.pts.push({ x, y, p });
            return true;
          }
          if (!this.divided) {
            if (this.depth >= this.maxD) {
              this.pts.push({ x, y, p });
              return true;
            }
            this._sub();
          }
          return (
            this.ne.insert(x, y, p) || this.nw.insert(x, y, p) || this.se.insert(x, y, p) || this.sw.insert(x, y, p)
          );
        }
        _sub() {
          const { cx, cy, hw, hh } = this.boundary,
            qw = hw / 2,
            qh = hh / 2,
            d = this.depth + 1;
          this.ne = new QuadTree(new Rect(cx + qw, cy - qh, qw, qh), this.cap, this.maxD, d);
          this.nw = new QuadTree(new Rect(cx - qw, cy - qh, qw, qh), this.cap, this.maxD, d);
          this.se = new QuadTree(new Rect(cx + qw, cy + qh, qw, qh), this.cap, this.maxD, d);
          this.sw = new QuadTree(new Rect(cx - qw, cy + qh, qw, qh), this.cap, this.maxD, d);
          this.divided = true;
          for (const pt of this.pts)
            this.ne.insert(pt.x, pt.y, pt.p) ||
              this.nw.insert(pt.x, pt.y, pt.p) ||
              this.se.insert(pt.x, pt.y, pt.p) ||
              this.sw.insert(pt.x, pt.y, pt.p);
          this.pts.length = 0;
        }
        query(range, out) {
          if (!this.boundary.intersects(range)) return;
          for (const pt of this.pts) if (range.contains(pt.x, pt.y)) out.push(pt.p);
          if (this.divided) {
            this.ne.query(range, out);
            this.nw.query(range, out);
            this.se.query(range, out);
            this.sw.query(range, out);
          }
        }
        draw(ctx) {
          const { cx, cy, hw, hh } = this.boundary;
          ctx.strokeStyle = 'rgba(56,200,168,0.15)';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(cx - hw, cy - hh, hw * 2, hh * 2);
          if (this.divided) {
            this.ne.draw(ctx);
            this.nw.draw(ctx);
            this.se.draw(ctx);
            this.sw.draw(ctx);
          }
        }
        countNodes() {
          let n = 1;
          if (this.divided)
            n +=
              (this.ne?.countNodes() ?? 0) +
              (this.nw?.countNodes() ?? 0) +
              (this.se?.countNodes() ?? 0) +
              (this.sw?.countNodes() ?? 0);
          return n;
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  Base Particle
      // ════════════════════════════════════════════════════════════════
      class Particle {
        constructor(pos, vel, acc = Vec.zero()) {
          this._state = {};
          this.position = pos;
          this.velocity = vel;
          this.acceleration = acc;
        }
        get isAlive() {
          return true;
        }
        update(dt, qt) {
          if (qt) this._state.qt = qt;
          this.velocity = this.velocity.add(this.acceleration.scale(dt));
          this.position = this.position.add(this.velocity.scale(dt));
          this.acceleration = Vec.zero();
        }
        render(ctx) {
          const r = this._state.radius ?? 4;
          ctx.beginPath();
          ctx.arc(this.position.x, this.position.y, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function apply(decs, Base) {
        return decs.reduceRight((C, d) => d(C), Base);
      }

      // ════════════════════════════════════════════════════════════════
      //  Base Decorators
      // ════════════════════════════════════════════════════════════════
      const WithSize = (r) => (Base) =>
        class extends Base {
          constructor(...a) {
            super(...a);
            this._state.radius = r;
            this._state.queryBuffer = [];
          }
        };
      const WithColor =
        (r, g, b, a = 1) =>
        (Base) =>
          class extends Base {
            render(ctx) {
              ctx.save();
              ctx.fillStyle = ctx.strokeStyle = `rgba(${r},${g},${b},${a})`;
              super.render(ctx);
              ctx.restore();
            }
          };
      const WithLifetime = (mx) => (Base) =>
        class extends Base {
          constructor(...a) {
            super(...a);
            this._state.age = 0;
            this._state.maxAge = mx;
          }
          get isAlive() {
            return this._state.age < mx;
          }
          update(dt, qt) {
            this._state.age += dt;
            super.update(dt, qt);
          }
        };
      const WithFade = () => (Base) =>
        class extends Base {
          render(ctx) {
            const { age = 0, maxAge = 1 } = this._state;
            ctx.save();
            ctx.globalAlpha = Math.max(0, 1 - age / maxAge);
            super.render(ctx);
            ctx.restore();
          }
        };
      const WithShrink = () => (Base) =>
        class extends Base {
          render(ctx) {
            const { age = 0, maxAge = 1 } = this._state;
            const s = Math.max(0, 1 - age / maxAge);
            ctx.save();
            ctx.translate(this.position.x, this.position.y);
            ctx.scale(s, s);
            ctx.translate(-this.position.x, -this.position.y);
            super.render(ctx);
            ctx.restore();
          }
        };
      const WithGlow =
        (c = 'white', s = 12) =>
        (Base) =>
          class extends Base {
            render(ctx) {
              ctx.save();
              ctx.shadowColor = c;
              ctx.shadowBlur = s;
              super.render(ctx);
              ctx.restore();
            }
          };

      // ════════════════════════════════════════════════════════════════
      //  Motion Decorators
      // ════════════════════════════════════════════════════════════════
      const WithGravity = (gx = 0, gy = 300) => {
        const g = new Vec(gx, gy);
        return (Base) =>
          class extends Base {
            update(dt, qt) {
              this.acceleration = this.acceleration.add(g);
              super.update(dt, qt);
            }
          };
      };
      const WithTrail =
        (n = 20, c = 'rgba(255,255,255,0.15)') =>
        (Base) =>
          class extends Base {
            constructor(...a) {
              super(...a);
              this._state.history = [];
            }
            update(dt, qt) {
              const h = this._state.history;
              h.push(this.position.clone());
              if (h.length > n) h.shift();
              super.update(dt, qt);
            }
            render(ctx) {
              const h = this._state.history;
              if (h.length > 1) {
                ctx.save();
                ctx.lineWidth = this._state.radius ?? 2;
                ctx.lineCap = ctx.lineJoin = 'round';
                for (let i = 1; i < h.length; i++) {
                  ctx.globalAlpha = (i / h.length) * 0.7;
                  ctx.strokeStyle = c;
                  ctx.beginPath();
                  ctx.moveTo(h[i - 1].x, h[i - 1].y);
                  ctx.lineTo(h[i].x, h[i].y);
                  ctx.stroke();
                }
                ctx.restore();
              }
              super.render(ctx);
            }
          };
      const WithBounce =
        (bounds, res = 0.75) =>
        (Base) =>
          class extends Base {
            update(dt, qt) {
              super.update(dt, qt);
              const { width, height } = bounds,
                r = this._state.radius ?? 4;
              if (this.position.x - r < 0) {
                this.position = new Vec(r, this.position.y);
                this.velocity = new Vec(-this.velocity.x * res, this.velocity.y);
              } else if (this.position.x + r > width) {
                this.position = new Vec(width - r, this.position.y);
                this.velocity = new Vec(-this.velocity.x * res, this.velocity.y);
              }
              if (this.position.y - r < 0) {
                this.position = new Vec(this.position.x, r);
                this.velocity = new Vec(this.velocity.x, -this.velocity.y * res);
              } else if (this.position.y + r > height) {
                this.position = new Vec(this.position.x, height - r);
                this.velocity = new Vec(this.velocity.x, -this.velocity.y * res);
              }
            }
          };
      const WithWrap = (bounds) => (Base) =>
        class extends Base {
          update(dt, qt) {
            super.update(dt, qt);
            const { width, height } = bounds;
            if (this.position.x < 0) this.position = new Vec(width, this.position.y);
            if (this.position.x > width) this.position = new Vec(0, this.position.y);
            if (this.position.y < 0) this.position = new Vec(this.position.x, height);
            if (this.position.y > height) this.position = new Vec(this.position.x, 0);
          }
        };
      const WithSpeedLimit = (max) => (Base) =>
        class extends Base {
          update(dt, qt) {
            super.update(dt, qt);
            const sp = this.velocity.mag();
            if (sp > max) this.velocity = this.velocity.scale(max / sp);
          }
        };
      const WithDrag = (coef) => (Base) =>
        class extends Base {
          update(dt, qt) {
            super.update(dt, qt);
            this.velocity = this.velocity.scale(Math.pow(coef, dt * 60));
          }
        };
      const WithRotation = (av) => (Base) =>
        class extends Base {
          constructor(...a) {
            super(...a);
            this._state.angle = 0;
          }
          update(dt, qt) {
            this._state.angle += av * dt;
            super.update(dt, qt);
          }
          render(ctx) {
            const r = this._state.radius ?? 4,
              angle = this._state.angle ?? 0;
            ctx.save();
            ctx.translate(this.position.x, this.position.y);
            ctx.rotate(angle);
            ctx.beginPath();
            ctx.rect(-r, -r, r * 2, r * 2);
            ctx.fill();
            ctx.restore();
          }
        };

      // ════════════════════════════════════════════════════════════════
      //  Spatial Decorators
      // ════════════════════════════════════════════════════════════════
      const WithRepulsion =
        (radius = 60, force = 200) =>
        (Base) =>
          class extends Base {
            update(dt, qt) {
              if (qt) {
                const buf = this._state.queryBuffer;
                buf.length = 0;
                qt.query(Rect.circle(this.position.x, this.position.y, radius), buf);
                for (const o of buf) {
                  if (o === this) continue;
                  const dx = this.position.x - o.position.x,
                    dy = this.position.y - o.position.y,
                    dSq = dx * dx + dy * dy;
                  if (dSq === 0 || dSq > radius * radius) continue;
                  const d = Math.sqrt(dSq),
                    str = force * (1 - d / radius);
                  this.acceleration = this.acceleration.add(new Vec(dx / d, dy / d).scale(str));
                }
              }
              super.update(dt, qt);
            }
          };
      const WithAttraction =
        (radius = 120, force = 50, soften = 20) =>
        (Base) =>
          class extends Base {
            update(dt, qt) {
              if (qt) {
                const buf = this._state.queryBuffer;
                buf.length = 0;
                qt.query(Rect.circle(this.position.x, this.position.y, radius), buf);
                for (const o of buf) {
                  if (o === this) continue;
                  const dx = o.position.x - this.position.x,
                    dy = o.position.y - this.position.y,
                    dSq = dx * dx + dy * dy;
                  if (dSq > radius * radius) continue;
                  const d = Math.sqrt(dSq) || 0.01,
                    den = d + soften,
                    str = (force / (den * den)) * d;
                  this.acceleration = this.acceleration.add(new Vec(dx / d, dy / d).scale(str));
                }
              }
              super.update(dt, qt);
            }
          };
      const WithFlocking =
        (pR = 80, sR = 30, w = { sep: 1.8, align: 1.0, coh: 1.0 }, mf = 300, ms = 180) =>
        (Base) =>
          class extends Base {
            update(dt, qt) {
              if (qt) {
                const buf = this._state.queryBuffer;
                buf.length = 0;
                qt.query(Rect.circle(this.position.x, this.position.y, pR), buf);
                let sep = Vec.zero(),
                  align = Vec.zero(),
                  coh = Vec.zero(),
                  sc = 0,
                  fc = 0;
                for (const o of buf) {
                  if (o === this) continue;
                  const dx = this.position.x - o.position.x,
                    dy = this.position.y - o.position.y,
                    d = Math.sqrt(dx * dx + dy * dy);
                  if (d > pR) continue;
                  if (d < sR && d > 0) {
                    sep = sep.add(new Vec(dx, dy).scale(1 / d));
                    sc++;
                  }
                  align = align.add(o.velocity);
                  coh = coh.add(o.position);
                  fc++;
                }
                if (sc > 0)
                  sep = sep
                    .scale(1 / sc)
                    .normalize()
                    .scale(ms)
                    .sub(this.velocity)
                    .limit(mf);
                if (fc > 0) {
                  const da = align
                    .scale(1 / fc)
                    .normalize()
                    .scale(ms);
                  align = da.sub(this.velocity).limit(mf);
                  const dc = coh.scale(1 / fc);
                  coh = dc.sub(this.position).normalize().scale(ms).sub(this.velocity).limit(mf);
                }
                this.acceleration = this.acceleration
                  .add(sep.scale(w.sep))
                  .add(align.scale(w.align))
                  .add(coh.scale(w.coh));
                const sp = this.velocity.mag();
                if (sp > ms) this.velocity = this.velocity.scale(ms / sp);
              }
              super.update(dt, qt);
            }
          };
      const WithLinkDraw =
        (radius = 100, lineColor = 'rgba(150,180,255,1)', lw = 0.8) =>
        (Base) =>
          class extends Base {
            render(ctx) {
              const qt = this._state.qt,
                buf = this._state.queryBuffer;
              if (qt && buf && _showLinks) {
                buf.length = 0;
                qt.query(Rect.circle(this.position.x, this.position.y, radius), buf);
                ctx.save();
                ctx.lineWidth = lw;
                for (const o of buf) {
                  if (o === this) continue;
                  const dx = o.position.x - this.position.x,
                    dy = o.position.y - this.position.y,
                    d = Math.sqrt(dx * dx + dy * dy);
                  if (d >= radius) continue;
                  ctx.globalAlpha = (1 - d / radius) * 0.55;
                  ctx.strokeStyle = lineColor;
                  ctx.beginPath();
                  ctx.moveTo(this.position.x, this.position.y);
                  ctx.lineTo(o.position.x, o.position.y);
                  ctx.stroke();
                }
                ctx.restore();
              }
              super.render(ctx);
            }
          };

      // ════════════════════════════════════════════════════════════════
      //  Particle Classes
      // ════════════════════════════════════════════════════════════════
      const CONFETTI_COLORS = [
        [255, 80, 120],
        [80, 210, 120],
        [80, 150, 255],
        [255, 200, 60],
        [200, 80, 255],
        [255, 130, 60],
      ];
      let _showLinks = true;

      function buildClasses(bounds) {
        const SparkClass = apply(
          [
            WithFade(),
            WithShrink(),
            WithGravity(0, 420),
            WithTrail(16, 'rgba(255,160,40,0.18)'),
            WithGlow('orange', 9),
            WithColor(255, 160, 40),
            WithLifetime(0.8),
            WithSize(2.5),
          ],
          Particle
        );

        const BubbleClass = apply(
          [
            WithFade(),
            WithGlow('rgba(100,200,255,1)', 22),
            WithColor(80, 180, 255, 0.65),
            WithLifetime(3.5),
            WithSize(16),
          ],
          Particle
        );

        function makeConfetti() {
          const [r, g, b] = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
          const spin = Math.PI * (Math.random() > 0.5 ? 2.5 : -2.5);
          return apply(
            [WithFade(), WithRotation(spin), WithGravity(0, 220), WithColor(r, g, b), WithLifetime(2.0), WithSize(5)],
            Particle
          );
        }

        const SnowClass = apply(
          [WithFade(), WithDrag(0.94), WithGravity(0, 45), WithColor(220, 235, 255, 0.9), WithLifetime(6), WithSize(3)],
          Particle
        );

        const BounceClass = apply(
          [
            WithSpeedLimit(280),
            WithBounce(bounds, 0.85),
            WithRotation(Math.PI * (Math.random() > 0.5 ? 1.5 : -1.5)),
            WithGlow('rgba(255,210,80,0.6)', 14),
            WithColor(255, 210, 80),
            WithSize(6),
          ],
          Particle
        );

        const FlockClass = apply(
          [
            WithWrap(bounds),
            WithSpeedLimit(200),
            WithFlocking(90, 28, { sep: 2.0, align: 1.2, coh: 1.0 }, 280, 200),
            WithGlow('rgba(80,200,255,0.5)', 6),
            WithColor(80, 200, 255),
            WithSize(3),
          ],
          Particle
        );

        const ConstellationClass = apply(
          [
            WithFade(),
            WithLinkDraw(110, 'rgba(140,185,255,1)', 0.6),
            WithWrap(bounds),
            WithSpeedLimit(80),
            WithDrag(0.97),
            WithAttraction(110, 30, 15),
            WithColor(200, 220, 255, 0.9),
            WithLifetime(14),
            WithSize(2),
          ],
          Particle
        );

        const RepulsorClass = apply(
          [
            WithBounce(bounds, 0.6),
            WithSpeedLimit(300),
            WithDrag(0.95),
            WithRepulsion(55, 350),
            WithGlow('rgba(255,100,180,0.6)', 10),
            WithColor(255, 100, 180),
            WithSize(4),
          ],
          Particle
        );

        const OrbitalClass = apply(
          [
            WithBounce(bounds, 0.5),
            WithSpeedLimit(250),
            WithDrag(0.96),
            WithRepulsion(40, 600),
            WithAttraction(140, 20, 10),
            WithTrail(10, 'rgba(120,255,180,0.1)'),
            WithGlow('rgba(120,255,180,0.5)', 8),
            WithColor(120, 255, 180),
            WithSize(3),
          ],
          Particle
        );

        return {
          spark: SparkClass,
          bubble: BubbleClass,
          confetti: makeConfetti,
          snow: SnowClass,
          bouncer: BounceClass,
          flock: FlockClass,
          constellation: ConstellationClass,
          repulsor: RepulsorClass,
          orbital: OrbitalClass,
        };
      }

      // ════════════════════════════════════════════════════════════════
      //  ParticleSystem
      // ════════════════════════════════════════════════════════════════
      class ParticleSystem {
        constructor(b) {
          this.particles = [];
          this.bounds = b;
          this.qt = this._make(b);
        }
        _make(b) {
          return new QuadTree(new Rect(b.width / 2, b.height / 2, b.width / 2, b.height / 2), 8, 8);
        }
        add(p) {
          this.particles.push(p);
        }
        get count() {
          return this.particles.length;
        }
        clear() {
          this.particles = [];
        }
        get all() {
          return this.particles;
        }
        resize(b) {
          this.bounds = b;
          this.qt = this._make(b);
        }
        update(dt) {
          this.qt.clear();
          for (const p of this.particles) this.qt.insert(p.position.x, p.position.y, p);
          for (const p of this.particles) p.update(dt, this.qt);
          this.particles = this.particles.filter((p) => p.isAlive);
        }
        render(ctx, dbg = false) {
          if (dbg) this.qt.draw(ctx);
          for (const p of this.particles) p.render(ctx);
        }
      }

      // ════════════════════════════════════════════════════════════════
      //  Decorator Stack Display Data
      // ════════════════════════════════════════════════════════════════
      const STACKS = {
        spark: {
          name: 'SparkParticle',
          primary: '@WithGravity · @WithTrail · @WithShrink',
          decs: [
            ['WithFade', ''],
            ['WithShrink', ''],
            ['WithGravity', '0, 420'],
            ['WithTrail', '16, "rgba(255,160,40,0.18)"'],
            ['WithGlow', '"orange", 9'],
            ['WithColor', '255, 160, 40'],
            ['WithLifetime', '0.8'],
            ['WithSize', '2.5'],
          ],
          note: '<b>@WithShrink</b> scales to zero over the lifetime ratio. <b>@WithTrail</b> samples position history each update — no QuadTree needed.',
        },
        bubble: {
          name: 'BubbleParticle',
          primary: '@WithGlow · @WithSize (large)',
          decs: [
            ['WithFade', ''],
            ['WithGlow', '"rgba(100,200,255,1)", 22'],
            ['WithColor', '80, 180, 255, 0.65'],
            ['WithLifetime', '3.5'],
            ['WithSize', '16'],
          ],
          note: '<b>@WithGlow</b> sets canvas shadowBlur. Large <b>@WithSize</b> paired with low opacity creates the translucent sphere look.',
        },
        confetti: {
          name: 'ConfettiParticle',
          primary: '@WithRotation · @WithGravity',
          decs: [
            ['WithFade', ''],
            ['WithRotation', 'spin  // random ±2.5π'],
            ['WithGravity', '0, 220'],
            ['WithColor', 'r, g, b  // random'],
            ['WithLifetime', '2.0'],
            ['WithSize', '5'],
          ],
          note: '<b>@WithRotation</b> accumulates _state.angle each frame and replaces the circle render with a rotated square. Each instance picks a random color.',
        },
        snow: {
          name: 'SnowParticle',
          primary: '@WithDrag · @WithGravity',
          decs: [
            ['WithFade', ''],
            ['WithDrag', '0.94'],
            ['WithGravity', '0, 45'],
            ['WithColor', '220, 235, 255, 0.9'],
            ['WithLifetime', '6'],
            ['WithSize', '3'],
          ],
          note: '<b>@WithDrag</b> applies velocity *= coef^(dt×60) each frame — frame-rate independent damping. Low gravity (45) + drag (0.94) produces realistic flutter.',
        },
        bouncer: {
          name: 'BouncerParticle',
          primary: '@WithBounce · @WithRotation',
          decs: [
            ['WithSpeedLimit', '280'],
            ['WithBounce', 'bounds, 0.85'],
            ['WithRotation', 'spin  // random ±1.5π'],
            ['WithGlow', '"rgba(255,210,80,0.6)", 14'],
            ['WithColor', '255, 210, 80'],
            ['WithSize', '6'],
          ],
          note: '<b>@WithBounce</b> clamps position to boundary and negates the velocity component scaled by restitution (0.85 = 15% energy loss). No lifetime — bounces forever.',
        },
        flock: {
          name: 'FlockParticle',
          primary: '@WithFlocking · @WithWrap',
          decs: [
            ['WithWrap', 'bounds'],
            ['WithSpeedLimit', '200'],
            ['WithFlocking', '90, 28, { sep:2.0, align:1.2, coh:1.0 }'],
            ['WithGlow', '"rgba(80,200,255,.5)", 6'],
            ['WithColor', '80, 200, 255'],
            ['WithSize', '3'],
          ],
          note: 'QuadTree cuts flock neighbor checks from <b>O(n²)</b> → <b>O(n log n)</b>. At 400 particles: ~160k → ~3.6k comparisons per frame.',
        },
        constellation: {
          name: 'ConstellationParticle',
          primary: '@WithLinkDraw · @WithAttraction',
          decs: [
            ['WithFade', ''],
            ['WithLinkDraw', '110, "rgba(140,185,255,1)", 0.6'],
            ['WithWrap', 'bounds'],
            ['WithSpeedLimit', '80'],
            ['WithDrag', '0.97'],
            ['WithAttraction', '110, 30, 15'],
            ['WithColor', '200, 220, 255, 0.9'],
            ['WithLifetime', '14'],
            ['WithSize', '2'],
          ],
          note: '<b>@WithLinkDraw</b> queries _state.qt during render(). Without the QuadTree, link drawing would be O(n²) per render frame.',
        },
        repulsor: {
          name: 'RepulsorParticle',
          primary: '@WithRepulsion',
          decs: [
            ['WithBounce', 'bounds, 0.6'],
            ['WithSpeedLimit', '300'],
            ['WithDrag', '0.95'],
            ['WithRepulsion', '55, 350'],
            ['WithGlow', '"rgba(255,100,180,.6)", 10'],
            ['WithColor', '255, 100, 180'],
            ['WithSize', '4'],
          ],
          note: 'Repulsion queries only within radius=55px. Dense clusters auto-settle to equilibrium. <b>@WithDrag</b> prevents energy runaway.',
        },
        orbital: {
          name: 'OrbitalParticle',
          primary: '@WithAttraction + @WithRepulsion',
          decs: [
            ['WithBounce', 'bounds, 0.5'],
            ['WithSpeedLimit', '250'],
            ['WithDrag', '0.96'],
            ['WithRepulsion', '40, 600'],
            ['WithAttraction', '140, 20, 10'],
            ['WithTrail', '10, "rgba(120,255,180,.1)"'],
            ['WithGlow', '"rgba(120,255,180,.5)", 8'],
            ['WithColor', '120, 255, 180'],
            ['WithSize', '3'],
          ],
          note: 'Attraction + Repulsion → natural equilibrium distance (~70px). The QuadTree makes it feasible to run <b>both</b> spatial queries every frame.',
        },
      };

      function renderStack(mode) {
        const s = STACKS[mode];
        if (!s) return;
        document.getElementById('primary-badge').textContent = '★ ' + s.primary;
        let html = '';
        for (const [fn, args] of s.decs)
          html += `<div><span class="dec-at">@</span><span class="dec-name">${fn}</span><span class="dec-paren">(</span><span class="dec-args">${args}</span><span class="dec-paren">)</span></div>`;
        html += `<div class="dec-class"><span class="dec-kw">class </span>${s.name} <span class="dec-ext">extends Particle</span> {}</div>`;
        document.getElementById('dec-stack').innerHTML = html;
        document.getElementById('perf-note').innerHTML = s.note;
      }

      // ════════════════════════════════════════════════════════════════
      //  App
      // ════════════════════════════════════════════════════════════════
      const canvas = document.getElementById('c'),
        ctx = canvas.getContext('2d');
      const qtCanvas = document.getElementById('qt-canvas'),
        qtCtx = qtCanvas.getContext('2d');

      let system,
        bounds,
        classes,
        currentMode = 'spark',
        mouseDown = false;
      let _showQt = false,
        _showRadius = false;
      let spawnCount = 10,
        spawnSpeed = 1.0;
      let lastTime = performance.now(),
        fpsArr = [],
        qtTick = 0;

      const PERCEPTION = { flock: 90, constellation: 110, repulsor: 55, orbital: 140 };

      function resize() {
        const w = canvas.parentElement;
        canvas.width = w.clientWidth;
        canvas.height = w.clientHeight;
        bounds = { width: canvas.width, height: canvas.height };
        classes = buildClasses(bounds);
        if (system) system.resize(bounds);
        else system = new ParticleSystem(bounds);
        qtCanvas.width = qtCanvas.offsetWidth * 2;
        qtCanvas.height = qtCanvas.offsetHeight * 2;
      }
      window.addEventListener('resize', resize);
      resize();
      renderStack('spark');

      function rand(a, b) {
        return a + Math.random() * (b - a);
      }

      function spawnAt(x, y) {
        const angle = Math.random() * Math.PI * 2,
          speed = rand(60, 160) * spawnSpeed;
        const vx = Math.cos(angle) * speed,
          vy = currentMode === 'spark' ? Math.sin(angle) * speed - 80 : Math.sin(angle) * speed;
        const Cls = currentMode === 'confetti' ? classes.confetti() : classes[currentMode];
        if (Cls) system.add(new Cls(new Vec(x, y), new Vec(vx, vy)));
      }

      function loop(now) {
        requestAnimationFrame(loop);
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;
        fpsArr.push(1 / dt);
        if (fpsArr.length > 30) fpsArr.shift();
        const fps = Math.round(fpsArr.reduce((a, b) => a + b, 0) / fpsArr.length);

        ctx.fillStyle = 'rgba(3,5,13,0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        system.update(dt);
        system.render(ctx, _showQt);

        if (_showRadius && system.all.length) {
          const r = PERCEPTION[currentMode] ?? 0;
          if (r > 0) {
            const p = system.all[0];
            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(p.position.x, p.position.y, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
          }
        }

        document.getElementById('st-count').textContent = system.count;
        document.getElementById('st-fps').textContent = fps;
        document.getElementById('st-qt').textContent = system.qt.countNodes();
        if (system.all.length) {
          const r = PERCEPTION[currentMode] ?? 0,
            buf = [];
          if (r > 0) {
            const s = system.all[Math.floor(Math.random() * system.all.length)];
            system.qt.query(Rect.circle(s.position.x, s.position.y, r), buf);
          }
          document.getElementById('st-nb').textContent = buf.length;
        }

        if (++qtTick % 3 === 0) {
          const w = qtCanvas.width,
            h = qtCanvas.height,
            sx = w / (bounds.width || 1),
            sy = h / (bounds.height || 1);
          qtCtx.clearRect(0, 0, w, h);
          qtCtx.save();
          qtCtx.scale(sx, sy);
          system.qt.draw(qtCtx);
          qtCtx.fillStyle = 'rgba(56,200,168,0.7)';
          for (const p of system.all) {
            qtCtx.beginPath();
            qtCtx.arc(p.position.x, p.position.y, 1.5, 0, Math.PI * 2);
            qtCtx.fill();
          }
          qtCtx.restore();
        }
      }
      requestAnimationFrame(loop);

      function getPos(e) {
        const r = canvas.getBoundingClientRect(),
          s = e.touches ? e.touches[0] : e;
        return [s.clientX - r.left, s.clientY - r.top];
      }
      canvas.addEventListener('mousedown', (e) => {
        mouseDown = true;
        const [x, y] = getPos(e);
        for (let i = 0; i < spawnCount; i++) spawnAt(x + rand(-10, 10), y + rand(-10, 10));
      });
      canvas.addEventListener('mouseup', () => (mouseDown = false));
      canvas.addEventListener('mousemove', (e) => {
        if (!mouseDown) return;
        const [x, y] = getPos(e);
        for (let i = 0; i < Math.ceil(spawnCount / 4); i++) spawnAt(x + rand(-8, 8), y + rand(-8, 8));
      });
      canvas.addEventListener(
        'touchstart',
        (e) => {
          e.preventDefault();
          const [x, y] = getPos(e);
          for (let i = 0; i < spawnCount; i++) spawnAt(x + rand(-10, 10), y + rand(-10, 10));
        },
        { passive: false }
      );
      canvas.addEventListener(
        'touchmove',
        (e) => {
          e.preventDefault();
          const [x, y] = getPos(e);
          for (let i = 0; i < Math.ceil(spawnCount / 4); i++) spawnAt(x + rand(-8, 8), y + rand(-8, 8));
        },
        { passive: false }
      );

      document.querySelectorAll('.mode-btn[data-mode]').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.mode-btn[data-mode]').forEach((b) => b.classList.remove('is-active'));
          btn.classList.add('is-active');
          currentMode = btn.dataset.mode;
          document.getElementById('mode-hint').textContent = STACKS[currentMode]?.name ?? currentMode;
          renderStack(currentMode);
        });
      });

      function setupToggle(id, cb) {
        const el = document.getElementById(id);
        el.addEventListener('click', () => {
          el.classList.toggle('is-on');
          cb(el.classList.contains('is-on'));
        });
      }
      setupToggle('tog-qt', (v) => (_showQt = v));
      setupToggle('tog-radius', (v) => (_showRadius = v));
      setupToggle('tog-links', (v) => (_showLinks = v));

      document.getElementById('sl-count').addEventListener('input', function () {
        spawnCount = +this.value;
        document.getElementById('lbl-count').textContent = spawnCount;
      });
      document.getElementById('sl-speed').addEventListener('input', function () {
        spawnSpeed = +this.value;
        document.getElementById('lbl-speed').textContent = spawnSpeed.toFixed(1) + '×';
      });
      document.getElementById('clearBtn').addEventListener('click', () => {
        system.clear();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      });
      document.getElementById('fillBtn').addEventListener('click', () => {
        for (let i = 0; i < 200; i++) spawnAt(rand(20, bounds.width - 20), rand(20, bounds.height - 20));
      });
    </script>
  </body>
</html>
